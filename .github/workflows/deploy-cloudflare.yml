name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: fe92ecf2ec59a59f0d590224dc338302
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Deploy staging to Cloudflare Workers
        if: github.ref_name == 'dev'
        run: npm run deploy:cloudflare -- --env staging

      - name: Deploy production to Cloudflare Workers
        if: github.ref_name == 'master'
        run: npm run deploy:cloudflare
